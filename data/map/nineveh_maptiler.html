<script>
const DATA=JSON.parse(document.getElementById('ov').textContent);
maptilersdk.config.apiKey='owXDy3s2qQxOXnLQHyZG';
const map=new maptilersdk.Map({container:'map',style:maptilersdk.MapStyle.STREETS,
  language:maptilersdk.Language.ARABIC,center:[43.13,36.34],zoom:10.3});
map.addControl(new maptilersdk.NavigationControl({showCompass:false}),'top-left');
map.addControl(new maptilersdk.ScaleControl({unit:'metric'}),'bottom-left');
map.on('load',()=>{
  ['governorate','districts','subdistricts','mask'].forEach(k=>map.addSource(k,{type:'geojson',data:DATA[k]}));
  map.addLayer({id:'mask',type:'fill',source:'mask',paint:{'fill-color':'#f3f5f8','fill-opacity':0.55}});
  map.addLayer({id:'subdistricts',type:'line',source:'subdistricts',paint:{'line-color':'#8a99b8','line-width':1,'line-dasharray':[3,3],'line-opacity':0.7}});
  map.addLayer({id:'districts',type:'line',source:'districts',paint:{'line-color':'#3f527a','line-width':1.6,'line-dasharray':[5,3],'line-opacity':0.85}});
  map.addLayer({id:'gov-glow',type:'line',source:'governorate',paint:{'line-color':'#2f6db0','line-width':7,'line-blur':7,'line-opacity':0.35}});
  map.addLayer({id:'governorate',type:'line',source:'governorate',paint:{'line-color':'#1f3a6b','line-width':2.6}});
  setupToggles();setupSearch(DATA.places);setupClick();
  document.getElementById('stats').textContent='قاعدة MapTiler · أقضية '+DATA.districts.features.length+' · نواحٍ '+DATA.subdistricts.features.length;
  document.getElementById('load').style.opacity=0;setTimeout(()=>document.getElementById('load').style.display='none',400);
});
const LAYERS=[['الحدود (محافظة)','governorate','#1f3a6b'],['الأقضية','districts','#3f527a'],['النواحي','subdistricts','#8a99b8'],['تعتيم خارج نينوى','mask','#cfd6e0']];
const GROUP={governorate:['gov-glow','governorate']};
function setupToggles(){const box=document.getElementById('layers');
  LAYERS.forEach(([label,id,color])=>{const el=document.createElement('div');el.className='toggle';
    el.innerHTML='<span class="swatch"><span class="dot" style="background:'+color+'"></span>'+label+'</span><span class="st">على</span>';
    el.onclick=()=>{const ids=GROUP[id]||[id];const vis=map.getLayoutProperty(ids[0],'visibility')!=='none';
      ids.forEach(x=>{if(map.getLayer(x))map.setLayoutProperty(x,'visibility',vis?'none':'visible');});
      el.classList.toggle('off',vis);el.querySelector('.st').textContent=vis?'مخفي':'على';};
    box.appendChild(el);});}
function setupClick(){const layers=['districts','subdistricts','governorate'];
  map.on('click',e=>{const f=map.queryRenderedFeatures(e.point,{layers:layers.filter(l=>map.getLayer(l))})[0];
    const info=document.getElementById('info');if(!f){info.style.display='none';return;}
    const p=f.properties||{},name=p.name_ar||p['name:ar']||p.name||'(غير مسمّى)';
    const rows=Object.entries(p).filter(([k])=>!['name','name:ar','name:en','name_ar'].includes(k))
      .map(([k,v])=>'<div class="row"><span class="k">'+k+':</span><span>'+v+'</span></div>').join('');
    info.innerHTML='<h3>'+name+'</h3>'+(rows||'<span class="k">—</span>');info.style.display='block';});}
function setupSearch(places){const run=()=>{const q=document.getElementById('q').value.trim();if(!q)return;
  const f=(places.features||[]).find(x=>{const p=x.properties||{};return[p['name:ar'],p.name].some(n=>n&&n.includes(q));});
  if(f){map.flyTo({center:f.geometry.coordinates,zoom:14,speed:0.8});
    new maptilersdk.Popup({offset:12}).setLngLat(f.geometry.coordinates).setHTML('<b>'+(f.properties['name:ar']||f.properties.name)+'</b>').addTo(map);}
  else alert('لم يُعثر على: '+q);};
  document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')run();});}
</script>
